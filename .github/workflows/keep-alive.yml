name: Keep Trigger Backend Awake

# Pings the /health endpoint every 10 minutes so Render's free tier
# never sees 15 minutes of silence and never spins down. This means
# the Buy/Sell buttons respond instantly instead of waiting 30-60
# seconds for a cold start.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # lets you also trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf https://kaizen-trigger.onrender.com/health || echo "Ping failed (service may be waking up)"
